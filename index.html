<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

.open-btn {
    z-index: 10;
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #ff4f81;
    cursor: pointer;
}

.card {
    position: absolute;
    opacity: 0;
    transform: scale(0.8);
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: 0.8s;
}

.card.show {
    opacity: 1;
    transform: scale(1);
}

h1, .subtext {
    color: white;
}

/* LOVE naik */
.heart {
    position: absolute;
    font-size: 20px;
    animation: naik linear infinite;
    pointer-events: none;
}

@keyframes naik {
    0% {
        transform: translateY(110vh);
        opacity: 0;
    }
    10% { opacity: 1; }
    100% {
        transform: translateY(-15vh);
        opacity: 1;
    }
}

/* SUNFLOWER zigzag */
.flower {
    position: absolute;
    font-size: 22px;
    animation: zigzag linear infinite;
    pointer-events: none;
}

@keyframes zigzag {
    0% {
        transform: translateY(110vh) translateX(0);
        opacity: 0;
    }
    25% {
        transform: translateY(70vh) translateX(20px);
    }
    50% {
        transform: translateY(40vh) translateX(-20px);
    }
    75% {
        transform: translateY(10vh) translateX(15px);
    }
    100% {
        transform: translateY(-15vh) translateX(-15px);
        opacity: 1;
    }
}
</style>
</head>
<body>

<button class="open-btn" onclick="openCard()">Buka Pesan ❤️</button>

<div class="card" id="card">
    <h1>Semangat ya sayang kerjanya ❤️</h1>
    <div class="subtext">sehat sehat ya sayang, kalo ada masalah atau apapun itu cerita ke aku ya cinta</div>
    <div class="subtext">LOVE YOU MORE❤️!!!</div>
</div>

<!-- LOVE (banyak) -->
<div class="heart" style="left:5%; animation-duration:6s;">❤️</div>
<div class="heart" style="left:12%; animation-duration:7s;">❤️</div>
<div class="heart" style="left:20%; animation-duration:5s;">❤️</div>
<div class="heart" style="left:28%; animation-duration:6.5s;">❤️</div>
<div class="heart" style="left:36%; animation-duration:7.5s;">❤️</div>
<div class="heart" style="left:44%; animation-duration:5.5s;">❤️</div>
<div class="heart" style="left:52%; animation-duration:6s;">❤️</div>
<div class="heart" style="left:60%; animation-duration:7s;">❤️</div>
<div class="heart" style="left:68%; animation-duration:5s;">❤️</div>
<div class="heart" style="left:76%; animation-duration:6.8s;">❤️</div>
<div class="heart" style="left:84%; animation-duration:7.2s;">❤️</div>
<div class="heart" style="left:92%; animation-duration:5.8s;">❤️</div>

<!-- SUNFLOWER (lebih banyak) -->
<div class="flower" style="left:8%; animation-duration:9s;">🌻</div>
<div class="flower" style="left:18%; animation-duration:8s;">🌻</div>
<div class="flower" style="left:28%; animation-duration:10s;">🌻</div>
<div class="flower" style="left:38%; animation-duration:7.5s;">🌻</div>
<div class="flower" style="left:48%; animation-duration:9.5s;">🌻</div>
<div class="flower" style="left:58%; animation-duration:8.5s;">🌻</div>
<div class="flower" style="left:68%; animation-duration:7s;">🌻</div>
<div class="flower" style="left:78%; animation-duration:9s;">🌻</div>
<div class="flower" style="left:88%; animation-duration:8s;">🌻</div>

<script>
function openCard() {
    document.querySelector('.open-btn').style.display = 'none';
    document.getElementById('card').classList.add('show');
}
</script>

</body>
</html>
